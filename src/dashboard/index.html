<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Symphifo Local Orchestrator</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="topbar-brand">
          <span class="eyebrow">Symphifo</span>
          <span id="subtitle" class="muted"></span>
        </div>
        <div class="badges">
          <span id="health" class="badge badge-sm">connecting</span>
          <span id="lastRefresh" class="badge badge-sm badge-ghost">refresh: -</span>
          <button id="sound-toggle" class="sound-toggle" title="Toggle notification sounds"></button>
          <div class="dropdown dropdown-end" id="theme-dropdown">
            <div tabindex="0" role="button" class="badge theme-toggle" id="theme-toggle">
              <span class="theme-swatch" id="theme-swatch"></span>
              theme
              <svg width="10" height="10" viewBox="0 0 2048 2048" fill="currentColor"><path d="M1799 349l242 241-1017 1017L7 590l242-241 775 775 775-775z"/></svg>
            </div>
            <ul tabindex="0" class="dropdown-content menu bg-base-200 rounded-box z-50 w-40 p-2 shadow-lg" id="theme-menu">
              <li><label class="theme-option"><input type="radio" name="theme" value="auto" checked /><span class="theme-dot" style="background:#a855f7;"></span>Auto (OS)</label></li>
              <li><label class="theme-option"><input type="radio" name="theme" value="sunset" /><span class="theme-dot" style="background:#f97316;"></span>Sunset</label></li>
              <li><label class="theme-option"><input type="radio" name="theme" value="cupcake" /><span class="theme-dot" style="background:#fb7185;"></span>Cupcake</label></li>
            </ul>
          </div>
        </div>
      </header>

      <!-- Overview (always visible) -->
      <section class="overview-section">
        <div id="overview" class="stats shadow"></div>
      </section>

      <!-- Tab navigation -->
      <div class="tabs tabs-border" id="tab-nav" role="tablist">
        <button class="tab tab-active" data-tab="board" role="tab">Board</button>
        <button class="tab" data-tab="list" role="tab">List</button>
        <button class="tab" data-tab="events" role="tab">Events</button>
        <button class="tab" data-tab="insights" role="tab">Insights</button>
        <button class="tab" data-tab="runtime" role="tab">Runtime</button>
      </div>

      <!-- Tab: Board (Kanban) -->
      <section class="tab-panel active" data-panel="board">
        <div class="toolbar">
          <div class="toolbar-actions">
            <button id="rerun" class="btn btn-sm btn-ghost" title="Reload">↻</button>
            <button id="new-issue-btn" class="btn btn-sm btn-accent">+ New</button>
            <span id="issue-count" class="issue-count"></span>
          </div>
          <details class="filter-accordion" id="board-filter-accordion">
            <summary class="filter-accordion-summary">Filters</summary>
            <div class="filter-accordion-content">
              <div class="toolbar-right">
                <label for="state-filter">Filter:</label>
                <select id="state-filter" class="select select-bordered select-sm">
                  <option value="all">All</option>
                  <option value="Todo">Todo</option>
                  <option value="In Progress">In Progress</option>
                  <option value="In Review">In Review</option>
                  <option value="Blocked">Blocked</option>
                  <option value="Done">Done</option>
                  <option value="Cancelled">Cancelled</option>
                </select>

                <label for="category-filter">Capability:</label>
                <select id="category-filter" class="select select-bordered select-sm">
                  <option value="all">All</option>
                </select>

                <label for="query">Search:</label>
                <input id="query" class="input input-bordered input-sm" placeholder="Search issues..." />
              </div>
            </div>
          </details>
        </div>

        <!-- Create issue form (shared, hidden by default) -->
        <div id="create-form" class="create-form" hidden>
          <div class="create-form-grid">
            <div class="form-group span-2">
              <label>Title</label>
              <input id="cf-title" type="text" class="input input-bordered input-sm w-full" placeholder="What needs to be done" />
            </div>
            <div class="form-group span-2">
              <label>Description</label>
              <textarea id="cf-desc" rows="2" class="textarea textarea-bordered w-full" placeholder="Details, context, acceptance criteria..."></textarea>
            </div>
            <div class="form-group">
              <label>Priority (1-10)</label>
              <input id="cf-priority" type="number" class="input input-bordered input-sm w-full" min="1" max="10" value="1" />
            </div>
            <div class="form-group">
              <label>Max Attempts</label>
              <input id="cf-attempts" type="number" class="input input-bordered input-sm w-full" min="1" max="10" value="3" />
            </div>
            <div class="form-group span-2">
              <label>Labels <span class="hint">comma-separated</span></label>
              <input id="cf-labels" type="text" class="input input-bordered input-sm w-full" placeholder="bug, frontend, urgent" />
            </div>
            <div class="form-group span-2">
              <label>Paths <span class="hint">comma-separated file paths</span></label>
              <input id="cf-paths" type="text" class="input input-bordered input-sm w-full" placeholder="src/foo.ts, src/bar.ts" />
            </div>
          </div>
          <div class="create-form-actions">
            <button id="cf-cancel" class="btn btn-sm btn-ghost">Cancel</button>
            <button id="cf-submit" class="btn btn-sm btn-accent">Create Issue</button>
          </div>
        </div>

        <div id="kanban-board" class="kanban-board"></div>
      </section>

      <!-- Tab: List (master-detail) -->
      <section class="tab-panel" data-panel="list" hidden>
        <div class="issues-master-detail">
          <div class="master-panel">
            <div id="issue-list" class="issue-list"></div>
          </div>
          <div class="detail-panel" id="detail-panel">
            <div class="detail-placeholder" id="detail-placeholder">Select an issue to view sessions</div>
          </div>
        </div>
      </section>

      <!-- Tab: Events -->
      <section class="tab-panel" data-panel="events" hidden>
        <div class="toolbar">
          <details class="filter-accordion" id="events-filter-accordion">
            <summary class="filter-accordion-summary">Filters</summary>
            <div class="filter-accordion-content">
              <div class="toolbar-right">
                <label for="event-kind-filter">Kind:</label>
                <select id="event-kind-filter" class="select select-bordered select-sm">
                  <option value="all">All</option>
                  <option value="info">info</option>
                  <option value="state">state</option>
                  <option value="progress">progress</option>
                  <option value="error">error</option>
                  <option value="manual">manual</option>
                  <option value="runner">runner</option>
                </select>

                <label for="event-issue-filter">Issue:</label>
                <select id="event-issue-filter" class="select select-bordered select-sm">
                  <option value="all">All</option>
                </select>
              </div>
            </div>
          </details>

          <div class="toolbar-actions">
            <button id="clear-events" class="btn btn-sm btn-ghost">Clear</button>
          </div>
        </div>
        <div id="events" class="events"></div>
      </section>

      <!-- Tab: Insights -->
      <section class="tab-panel" data-panel="insights" hidden></section>

      <!-- Tab: Runtime -->
      <section class="tab-panel" data-panel="runtime" hidden>
        <div id="runtime-meta"></div>
      </section>
    </div>

    <script src="/assets/app.js"></script>
  </body>
</html>
