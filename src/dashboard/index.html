<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Symphifo Local Orchestrator</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Symphifo</p>
          <h1>Local Orchestra Runtime</h1>
          <p id="subtitle" class="muted">TypeScript local mode · Filesystem tracker · Codex-only execution</p>
        </div>
        <div class="badges">
          <span id="health" class="badge">status: connecting</span>
          <span id="lastRefresh" class="badge">refresh: -</span>
          <div class="theme-dropdown" id="theme-dropdown">
            <button type="button" class="badge theme-toggle" id="theme-toggle">
              <span class="theme-swatch" id="theme-swatch"></span>
              theme
              <svg width="10" height="10" viewBox="0 0 2048 2048" fill="currentColor"><path d="M1799 349l242 241-1017 1017L7 590l242-241 775 775 775-775z"/></svg>
            </button>
            <ul class="theme-menu" id="theme-menu">
              <li><label class="theme-option"><input type="radio" name="theme" value="auto" checked /><span class="theme-dot" style="background:#a855f7;"></span>Auto (OS)</label></li>
              <li><label class="theme-option"><input type="radio" name="theme" value="sunset" /><span class="theme-dot" style="background:#f97316;"></span>Sunset</label></li>
              <li><label class="theme-option"><input type="radio" name="theme" value="cupcake" /><span class="theme-dot" style="background:#fb7185;"></span>Cupcake</label></li>
            </ul>
          </div>
        </div>
      </header>

      <main class="layout">
        <section class="card">
          <h2>Overview</h2>
          <div id="overview" class="grid"></div>
        </section>

        <section class="card">
          <div class="toolbar">
            <h2>Issues</h2>
            <div class="toolbar-right">
              <label for="state-filter">Filter:</label>
              <select id="state-filter">
                <option value="all">All</option>
                <option value="Todo">Todo</option>
                <option value="In Progress">In Progress</option>
                <option value="In Review">In Review</option>
                <option value="Blocked">Blocked</option>
                <option value="Done">Done</option>
                <option value="Cancelled">Cancelled</option>
              </select>

              <label for="category-filter">Capability:</label>
              <select id="category-filter">
                <option value="all">All</option>
              </select>

              <label for="query">Search:</label>
              <input id="query" placeholder="e.g. LOCAL-1, title" />

              <button id="rerun">Reload</button>
              <button id="new-issue-btn" class="btn-accent">+ New</button>
              <span id="issue-count" class="issue-count"></span>
            </div>
          </div>

          <!-- Create issue form (hidden by default) -->
          <div id="create-form" class="create-form" hidden>
            <div class="create-form-grid">
              <div class="form-group span-2">
                <label>Title</label>
                <input id="cf-title" type="text" placeholder="What needs to be done" />
              </div>
              <div class="form-group span-2">
                <label>Description</label>
                <textarea id="cf-desc" rows="2" placeholder="Details, context, acceptance criteria..."></textarea>
              </div>
              <div class="form-group">
                <label>Priority (1-10)</label>
                <input id="cf-priority" type="number" min="1" max="10" value="1" />
              </div>
              <div class="form-group">
                <label>Max Attempts</label>
                <input id="cf-attempts" type="number" min="1" max="10" value="3" />
              </div>
              <div class="form-group span-2">
                <label>Labels <span class="hint">comma-separated</span></label>
                <input id="cf-labels" type="text" placeholder="bug, frontend, urgent" />
              </div>
              <div class="form-group span-2">
                <label>Paths <span class="hint">comma-separated file paths</span></label>
                <input id="cf-paths" type="text" placeholder="src/foo.ts, src/bar.ts" />
              </div>
            </div>
            <div class="create-form-actions">
              <button id="cf-cancel">Cancel</button>
              <button id="cf-submit" class="btn-accent">Create Issue</button>
            </div>
          </div>

          <div class="issues-master-detail">
            <div class="master-panel">
              <div id="issue-list" class="issue-list"></div>
            </div>
            <div class="detail-panel" id="detail-panel">
              <div class="detail-placeholder" id="detail-placeholder">Select an issue to view sessions</div>
            </div>
          </div>
        </section>

        <section class="card collapsed-section">
          <details>
            <summary><h2 style="display:inline">Runtime</h2></summary>
            <div id="runtime-meta"></div>
          </details>
        </section>

        <section class="card">
          <div class="toolbar">
            <h2>Live Events</h2>
            <div class="toolbar-right">
              <label for="event-kind-filter">Kind:</label>
              <select id="event-kind-filter">
                <option value="all">All</option>
                <option value="info">info</option>
                <option value="state">state</option>
                <option value="progress">progress</option>
                <option value="error">error</option>
                <option value="manual">manual</option>
                <option value="runner">runner</option>
              </select>

              <label for="event-issue-filter">Issue:</label>
              <select id="event-issue-filter">
                <option value="all">All</option>
              </select>

              <button id="clear-events">Clear</button>
            </div>
          </div>
          <div id="events" class="events"></div>
        </section>
      </main>
    </div>

    <script src="/assets/app.js"></script>
  </body>
</html>
