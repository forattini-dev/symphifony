<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>Offline · Fifony</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #020617;
        --panel: #0f172a;
        --line: rgba(148, 163, 184, 0.18);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #22d3ee;
        --accent-2: #4ade80;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(34, 211, 238, 0.14), transparent 42%),
          radial-gradient(circle at bottom, rgba(74, 222, 128, 0.12), transparent 36%),
          var(--bg);
        color: var(--text);
        font: 16px/1.5 ui-sans-serif, system-ui, sans-serif;
        padding: 24px;
      }
      main {
        width: min(100%, 520px);
        padding: 28px;
        border-radius: 24px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(15, 23, 42, 0.96), rgba(15, 23, 42, 0.84));
        box-shadow: 0 20px 60px rgba(2, 6, 23, 0.45);
      }
      .eyebrow {
        display: inline-flex;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid var(--line);
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      h1 { margin: 16px 0 8px; font-size: clamp(28px, 5vw, 40px); line-height: 1.05; }
      p { margin: 0; color: var(--muted); }
      .actions { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
      a, button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font: inherit;
        text-decoration: none;
        cursor: pointer;
      }
      a {
        color: #082f49;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        font-weight: 700;
      }
      button {
        color: var(--text);
        background: rgba(148, 163, 184, 0.12);
        border: 1px solid var(--line);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">Offline</div>
      <h1>Fifony is temporarily disconnected.</h1>
      <p>The dashboard shell is available, but live runtime data needs the local server connection to come back.</p>
      <div class="actions">
        <a href="/kanban">Try again</a>
        <button type="button" onclick="location.reload()">Reload</button>
      </div>
    </main>
  </body>
</html>
